body:
  text: 海棠譜譜録類三草木禽魚之屬提要臣等謹案海棠譜三卷宋陳思撰思有寶刻叢編已著録此書不見於宋史藝文志惟焦竑國史經籍志載有三卷與此本合前有開慶元年思自序文頗淺陋葢思本書賈終與文士異也上卷皆録海棠故實中下二卷則録唐宋諸家題咏而栽種之法品類之别僅於上卷中散見四五條葢數典之書惟以𨽻事為主者然搜羅不甚賅廣今以錦繡萬花谷全芳備祖諸書所類海棠事相較其故實似稍加詳而題詠則多闕略如唐之劉禹錫賈島宋之王珪楊繪朱子張孝祥王十朋諸家為陳景沂所收者此書並未録及然如張泊程琳宋祁李定之類亦有此書所有而陳氏脱漏者葢當時坊本各就所見裒集成書故互有詳略以宋人舊帙姑並存之以資㕘核云爾乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序世之花卉種類不一或以色而艶或以香而妍是皆鍾天地之秀為人所欽羨也梅花占於春前牡丹殿於春後騷人墨客特注意焉獨海棠一種風姿艶質固不在二花下自杜陵入蜀絶吟於是花世因以此薄之其後都官鄭谷已為舉似谷詩浣花溪上空惆悵子美無情為發揚本朝列聖品題雲章奎畫烜燿千古此花始得顯聞于時盛傳於世矣今採取諸家雜録及彚次唐以來諸人詩句以為一編目曰海棠譜雖纂集未能詳盡聊預衆譜之列云開慶改元長至日叙
