body:
  text: 海棠譜卷中宋陳思撰詩上海棠太宗每至春園獨有名天然與染半紅深芳菲占得歌臺地妖艶誰憐向日臨莫道無情閒笑臉任從折戴上冠簪偏宜雨後看顔色幾處金杯為爾斟海棠真宗春律行將半繁枝忽競芳霏霏含宿霧灼灼艶朝陽戲蝶棲輕蘂遊蜂逐逺香物華留賦詠非獨務雕章又同前翠萼凌晨綻清香逐處飄髙低臨曲檻紅白間纎條潤比攢温玊繁如簇絳綃盡堪圖畫取名筆在僧繇㑹􅒼屬賞海棠偶有題詠光宗濃淡名花産蜀鄉半含風露浥新粧嬌嬈不減舊時態誰與丹青為發揚觀海棠有成同前東風用意施顔色艶麗偏宜著雨時朝詠暮吟看不足羨他逸蝶宿深枝唐薛許昌能海棠詩并序蜀海棠有聞而詩無聞杜工部子美於斯有之矣得非興象不出殁而有懷何天之厚余獲此遺遇僅不敢讓用當其無因賦五言一章二十句學陳梁之紫妍漢魏之朱不以彼物擇其功不以陳言踵其趣或其人之適此有若韓宣子者風雅盡在蜀矣吾其庶幾又花植於府之古營因刻貞石以遺吾黨將來君子業詩者茍未變於道無賦耳咸通七年十二月二十三日叙酷烈復離披𤣥功莫我知青苔浮落處暮栁間開時醉帶遊人插連隂彼叟移晨前清露濕晏後惡風吹香少傳何計妍多畫半遺島蘇連水脈庭綻雜松枝偶泛因沈硯閒飄欲亂棊遶山生玉壘和郡徧坤維負賞慙休飲牽吟分失饑明年應不見留此贈巴兒又七言四海應無蜀海棠一時開處一城香晴來使府低臨檻雨後人家散出牆閒地細飄浮淨蘚短亭深綻隔垂楊從來看盡詩誰苦不及懽遊與畫將海棠鄭谷春風用意勻顔色銷得攜觴與賦詩濃麗最宜新著雨嬌嬈全在欲開時莫愁粉黛臨䆫懶梁廣丹青㸃筆遲朝醉暮吟看不足羨他蝴蝶宿深枝蜀中賞海棠鄭谷濃淡方春滿蜀鄉半隨風雨斷鶯腸浣花溪上空惆悵子美無情為發揚杜工部旅兩蜀詩集中無海棠之題擢第後入蜀經羅利路見海棠盛開偶題晏樞相殊上國休誇紅杏艶沈溪自照緑苔磯一枝低帶流鶯睡數片狂和舞蝶飛堪恨路長移不得可無人與畫將歸手中已有新春桂多謝煙香更入衣奉知真宗後苑雜花海棠晏樞相殊太液波才緑靈和絮未飄霞文光啓旦珠琲宻封條積潤涵仙露濃英奪海綃九陽資造化天意屬喬繇同和劉内翰筠遲景烘初綻鮮風惜未飄蝶魂迷宻徑鶯語近新條芳蕙薰宫錦丹漿暈海綃惟時奉宸唱賡奉愧咎繇海棠輕盈千結亂櫻藂占得年芳近碧櫳逐處間勻髙下萼幾畨分破淺深紅煙晴始覺香纓綻日極猶疑䗶蔕融數夕朱欄未飄落再三珍重石尤風又杳靄何驚目鮮妍欲蕩魂向人無限思當晝不勝繁浩露晴方浥遊蜂暖更暄只應春有意留贈子山園又昔聞遊客話芳菲濯錦江頭幾萬枝縱使許昌詩筆健可能終古絶妍辭又濯錦江頭樹移根藥砌中只應春有意偏與半粧紅和樞宻侍郎因看海棠憶禁苑此花最盛晏樞相青瑣曽留眄珍藂宛未移幸分霖雨潤猶見艶陽姿岸幘來朱檻攀條憶絳𬎼能令人愛樹不獨召南詩又郭待制稹朱欄明媚照横塘芳樹交加枕短牆傳得東君深意態染成西蜀好風光破紅枝上仍施粉繁翠隂中旋撲香應為無詩怨工部至今含露作啼粧又石學士延年君看海棠格羣花品詎同嬌嬈情自富蕭散艶非窮舊縠斑呉苑梅羅碎蜀宫錦窠杯裏影繡段隟前烘心亂香無數莖柔動滿叢意分巫峽雨腰細漢臺風盛若霞藏日鮮於血灑空髙低千㸃赤深淺半開紅粧指朱纔布膏唇檀更融色焦無可壓體瘦不成豐枝重輕浮外苞疎宻閙中難勝蜂不定易入蝶能通蜀地海棠繁媚有思加膩榦豐條苒弱可愛北方所未見諸公作詩流播西人予素好玩不能自黙然所道皆在前人陳迹中如國風申章亦無媿云宋景文公蜀國天餘煦珍葩地所宜濃芳不隱葉併艶欲然枝襞影分羣萼均霞㸃萬𬎼回文錦成後夾煎燎烘時蜂蘂迎銜宻鶯梢向坐危淺深雙絶態啼笑兩妍姿絳節排煙竦丹紅落帶垂童容鄣畏薄便面到憂遲媚日能徐照暄風肯遽吹蜀少疾風故花愈盛惜歡當晼晚留恨付離披麗極都無比繁多僅自持損香饒麝栢照影欠瑶池畫要精侔色歌須巧騁辭舉樽頻語客細摘玩芳期和晏尚書海棠媚柯攢仄倚春暉封植寧同北枳移花自西蜀流而穠麗不變台嶺分霞爭抱萼蜀宫裁錦鬭纏枝不憂輕露蒙時潤正恨炎風獵處危把酒凭欄堪併賞莫容私恨為披離海棠西域流根逺中都屬賞偏初無可並色竟不許勝妍薄暝霞烘爛平明露濯鮮長衾繡作地宻帳錦為天呉人語㡩覆為帳天淺影才欹檻柯横欲照筵愁心隨落處醉眼著繁籩的的誇粧靚畨畨恃笑嘕何嘗間蘭媚要是掩櫻然艶足非他譽香輕且近傳所嗟名後出遺載楚臣篇又三首並同前萬萼霞乾照曙空向來心賞已多同未如此日家園樂數徧繁枝衮衮紅暮春月内署書閣前海棠花盛開率爾七言八韻寄長卿諫議張洎去嵗海棠花發日曽將詩句詠芳妍今來花發春依舊君已雄飛玉案前驟隔清塵樞要地獨攀紅蘂艶陽天疎枝髙映銀臺月嫰葉低含綺閣煙花落花開懷勝賞春來春去感流年清辭早綴巴人唱妙翰猶緘蜀國牋共仰壯圖方赫耳自嗟衰鬢轉皤然因憑鶯蝶傳消息莫忘蓬萊有病僊海棠程琳海外移根灼灼竒風情閒麗比應稀晶熒寶萼排珠琲旖旎芳叢簇繡帷繁極只愁隨暮雨飄多何計駐春暉浣花溪上年年意露濕煙霞拂客衣海棠學士李定青帝行春信自專精心知向海棠偏不霑工部風騷力猶占勾芒造化權倚檻半開紅朶宻遶池初應翠枝連誰人與拔栽瓊苑看與花王鬭後先海棠著作石揚休化工裁剪用功専濯錦江頭價最偏酷愛幾思憑畫手難題渾覺挫詩權艶凝絳纈深深染樹認紅綃宻宻連因想當年武平一枝枝脊賜侍臣先海棠直講范鎮不知真宰是誰専生得韶光此樹偏吟筆偶遺工部意賦辭今職翰林權風飜翠幕晨香入霞照危牆夕影連移植上園如得地芳名應在紫薇先又石揚休開盡妖桃落盡梨淺荂深萼照華池都縁西蜀盤根逺豈是東君屬意遲煙慘别容曛宿酒露凝啼臉失臙脂須知賈相風流甚曽許神僊品格竒和學士李定輕紅如杏素遮梨直似佳人照碧池已是化工教艶絶莫嫌青帝與開遲煙滋綽約明雙臉雨借妖饒入四脂西蜀有名須得地瓊林髙壓百花竒和燕龍圖海棠推官楊諤西漢欺盧橘東陽愛野棠許昌竒此遇子美欠先揚杜宇三春艶𧖟叢一國香燕脂㸃亂雨生色麗斜陽富艶東君節暄妍白帝方錦樓祈水色玉壘換山光風格林檎細腰支郁李長天生笑容質時様舞衣裳少吐深深染全開淡淡粧煙媒䕶緑蔕風陣損朱房旋失因臨水閒飄弗過牆佩亡愁殺甫簪脫即連姜蝶舞菱花照鶯啼罨畫堂僊如弄玉少墜似緑珠常不見還成悔相思幾欲狂春深濯錦水日晚浣沙方卧對移簾柙吟看近筆牀池清滿園倒鳥起一枝昻紫燕銜泥急黄蜂趂蜜忙化工真用意銷得與攜觴海棠殿丞髙帷幾故國庸岷外孤根楚苑中使梅休妬白僊杏已饒紅旋恐陽城破尋憂下蔡空幾時夢巫峽獨立怨春風海棠髙覿錦里花中色最竒妖嬈天賦本來稀綺霞忽照迷紅障縠露輕籠設翠幃繁朶有情粧媚景纎枝無力帶殘暉好將繡向羅裙上永作香閨楚楚衣海棠凌景陽名園封植幾經春露濕煙梢畫不真多謝許昌傳雅什蜀都曽未識詩人海棠學士張冕海棠栽植徧塵寰未必成都欲詠難山木𤓰開千顆顆水林檎發一攢攢大約木𤓰林檎花初發皆與海棠相類但花稀而先葉耳惟山木𤓰水林檎尤似山木𤓰揚州有之楮木叢也初疑紅豆爭頭綴忽覺燕脂衆手丸西蜀僧家根撥小南荆官舎樹支寬髙穿羣木無因蔽平倚危樓最好看十畆園林渾似火數方池面悉如丹錦袍萬丈仍連袂白傳珠被齊光更合歡楚詞風嫋細腰粧正罷楚宫露睎銅雀淚新乾晨曦逺借彤雲暖秋魄微侵甲帳寒㑹讌豈勞供幄幙採香應見費龍檀穠燒游女青絲髮殷染妖姬白玉冠賓席半移隈茜綬使車多熱簇雕鞍層層排朶縈飛蝶宻宻交柯宿翠翰詩客早慙矜縷管畫工誰敢衒霜紈本期相伴千場醉可忍輕邀百卉殘川路尚移隨迅瀬蕃船猶折出長瀾飄零絳雪深盈尺收拾晴霞散結團時去獨應賢者識色空濳有達人觀譜為僊子終須美花譜以海棠為祌僊王禹偁海僊詩序實作寒梅況不酸寒梅事具序中五六年來離别恨春宵頻夢石臺盤荆王石臺盤在後園海棠林下至今存焉西園海棠范純仁丹葩翠葉競妖濃蜂蝶翻翻弄暖風濯雨正疑宫錦爛媚晴先奪曉霞紅芬菲劒外從來勝歡賞天涯為爾同却想鄉闗足塵土只應能見畫圖中英韶在前徒矜下里之曲風雅未喪豈繫擊轅之音不圖綴綺靡之辭抑將導敦厚之旨耳海棠雖盛於蜀人不甚貴因暇偶成五言百韻律詩一章四韻詩一章附于卷末知我者無加焉沈立岷蜀地千里海棠花獨妍萬株佳麗國二月艶陽天叢萼勻如布脩蕤巧似編彤雲輕㸃綴赤玊碎雕鐫瑟瑟光輸瑩猩猩血借鮮淺深相向背疎宻遞勾牽輕蒨重重染丹砂細細研蘂纎金粟拱鬚嫰紫絲拳紅蠟隨英滴明璣著顆穿初莖爭裊娜翹榦共蹁蹮絶代知無價生香不減𣝕分靈應桂苑鍾粹定星躔木帝經邦相花王入室賢祥飈加剪拂卿靄共陶甄真宰隂推轂勾芒與著鞭不須憂薄命好為惜流年贊翼施生柄扶持煦嫗權主張韶令正調燮淑威宣和氣髙低洽芳心次第還金釵人十二珠履客三千雲雨迷巫峽風波怨洛川姘婷宜住楚妖冶合居燕綉被通宵展華燈徹曙燃横披前檻外半出假山巔暗羨遊蜂採偷輸蟻穴沿瘦嫌蛛網織柔怯女蘿纏蓄恨憑誰訊無言只自憐文君酒壚伴揚子草堂前品格生來别風流到老全繁中生悵望衆裏見喧闐暄暖精神出晴明意態便闗闗鶯對語兩兩燕髙騫天上宜封殖人間偶佇延共櫻圍别館與杏擁斜阡清暖簾爭卷黄昏幕尚褰低籠金轣􅣗髙映畫鞦韆忽認梁園妓深疑閬苑仙怱怱來蕙圃逺逺别芝田羞隱暝濛霧輕如淡蕩煙乍逢開羽扇初喜下雲軿髣髴向星靨依稀帶翠鈿五銖衣宛轉七寶帳翩翾獨立挨霓節成行列彩旃困宜欹虎枕步好襯金蓮舞定休回袖粧濃不傅鈆蓋張松鬱鬱茵藉草芊芊馥郁蘭供夢扶疎栁共眠軀輕彌綽約腰細更便嬛婭姹常顒若幽柔自灑然侍兒羅白芷婢子列芳荃口口濃檀注腮腮薄粉填解圍施葉幄買笑有榆錢旖旎環瑶席婆娑匝玳筵嬌依屏曲曲泣對露涓涓南陌輕埃蔽東郊夕照連幾時休縹緲從此識嬋娟是處遺簪珥誰家不管絃妬姬貪恐失戲稚惜何顛折閃搔頭褪擎摐約腕揎戴遮鬟上鳯裝壓鬢邊蟬汲引新懽聚消磨宿忿蠲縱觀須倒載命宴必加籩翻曲教歌媛更詞送酒船鄉心須暫解病眼當時痊迢遞來油壁從容住錦韀雅宜交讓比穠興棣華聨不憤參朱槿寧甘混木綿酴醿濳失色躑躅敢差肩素柰思投迹夭桃恥備員梧桐愧金井芍藥濫花磚併壓辛夷俗潛排寶馬蔫天恩無乆恃人寵莫長専布影交三徑敷榮遍一㕓凝眸方曄曄迴首旋翩翩可忍驚飈挫胡煩急景煎珊瑚隨手碎絳雪繞枝旋拂漢霞初散當樓月自圓飄零隨蠛蠓散亂逐漪漣灼灼龜城外亭亭錦水邊抱愁應慘蹙有淚即潺湲午影迷蝴蝶朝寒怨杜鵑物情元倚伏人意莫拘攣擢秀髙羣木稱珍極八埏未開獨脈脈憂落固悁悁别著新文紀重尋舊譜箋共知紅艶好誰辨赤心堅實事陪朱李根宜灌醴泉栽須隣竹栢樹莫繞烏鳶恥託膏腴茂當隨富貴遷為多猶底滯因逺尚迍邅客思易成亂心期未省愆畫思摩詰筆吟稱薛濤牋醉目休頻送詩情豈易縁薛能誇麗句鄭谷賞佳篇止感芳姿美那憐託地偏山經猶罕記方志未多傳巧詠憂才竭㝠搜得意滇遐陬寡真賞僻境忍輕捐抽秘慙非據探竒敢讓先援毫叙名卉聊用放懷焉又占斷香與色蜀花徒自開園林無即俗蜂蝶落仍來青帝若為意東風無限才古今吟不盡百韻愧空裁海棠譜卷中
