body:
  text: 海棠譜卷上宋陳思撰叙事蜀花稱美者有海棠焉然記牒多所不録蓋恐近代有之何者古今獨棄此而取彼耶嘗聞真宗皇帝御製後苑雜花十題以海棠為首章賜近臣唱和則知海棠足與牲丹抗衡而可獨步於西州矣因搜擇前志惟唐相賈元靖耽著百花譜以海棠為花中神僊誠不虚美耳近世名儒巨賢發于歌詠清辭麗句徃徃而得立慶厯中為縣洪雅春多暇日地富海棠幸得為東道主惜其繁艶為一隅之滯卉為作海棠記叙其大槩及編次諸公詩句于右復率蕪拙作五言百韻詩一章四韻詩一章附于卷末好事者幸無誚焉沈立海棠記序棠之稱甚衆若詩有蔽芾甘棠又曰有杕之杜又爾雅釋木曰杜甘棠也郭璞注今之杜梨杜赤棠白者棠又吕氏春秋果之美者棠實又俗説有地棠棠梨沙棠味如李無核較是數説俱非謂海棠也凡今草木以海為名者酉陽雜俎云唐贊皇李徳裕嘗言花名中之帶海者悉從海外來故知海椶海栁海石榴海木𤓰之類俱無聞於記述豈以多而為稱耶又非多也誠恐近代得之于海外耳又杜子美海椶行云欲栽北辰不可得惟有西域胡僧識若然則贊皇之言不誣矣海棠雖盛稱於蜀而蜀人不甚重今京師江淮尤競植之毎一本價不下數十金勝地名園目為佳致而出江南者復稱之曰南海棠大抵相類而花差小色尤深耳棠性多類梨核生者長遲逮十數年方有花都下接花工多以嫩枝附梨而贅之則易茂矣種宜壚壤膏沃之地其根色黄而盤勁其木堅而多節其外白而中赤其枝柔宻而脩暢其葉類杜大者縹緑色而小者淺紫色其紅花五出初極紅如臙脂㸃㸃然及開則漸成纈暈至落則若宿粧淡粉矣其蔕長寸餘淡紫色於葉間或三萼至五萼為叢而生其蘂如金粟蘂中有鬚三如紫絲其香清酷不蘭不麝其實狀如梨大若櫻桃至秋熟可食其味甘而微酸兹棠之大槩也沈立海棠記杜子美居蜀累年吟詠殆遍海棠竒艶而詩章獨不及何耶鄭谷詩云浣花溪上空惆悵子美無情為發揚是已本朝名士賦海棠甚多徃徃皆用此為實事如石延年云杜甫句作略薛能詩未工錢易詩云子美無情甚都官著意頻李定詩云不霑工部風騷力猶占勾芒造化權獨王荆公詩用此作梅花詩最為有意所謂少陵為爾牽詩興可是無心賦海棠末句云多謝許昌傳雅什蜀都曽未識詩人不道破為尤工也韻語陽秋東坡海棠詩曰只恐夜深花睡去更燒銀燭照紅粧事見太真外傳曰上皇登沈香亭召太真妃于時夘醉未醒命力士使侍兒扶掖而至妃子醉韻殘粧鬢亂釵横不能再拜上皇笑曰豈妃子醉是海棠睡未足耳冷齋夜話東坡謫黄州居于定惠院之東雜花滿山而獨海棠一株土人不知貴東坡為作長篇平生喜為人寫人間刻石者自有五六本云吾平生最得意詩也古今詩話韓持國雖剛果特立風節凜然而情致風流絶出時輩許昌崔象之侍郎舊第今為杜君章所有㕔後小亭僅丈餘有海棠兩株持國每花開輒載酒日飲其下竟謝而去嵗以為常至今故吏尚能言之石林詩話少游在黄州飲於海橋天南北多海棠有老書生家海棠叢間少游醉卧宿於此明日題其柱曰喚起一聲人悄衾冷夢寒牕曉瘴雨過海棠開春色又添多少社甕釀成微笑半破椰瓢共舀覺健倒急投牀醉鄉廣大人間小東坡愛之恨不得其腔當有知之者耳冷齋夜話李丹大夫客都下一年無差遣乃授昌州議者以去家逺乃改授鄂州倅淵材聞之乃吐飯大步徃謁李曰誰為大夫謀昌佳郡也奈何棄之李驚曰供給豐乎曰非也民訟簡乎曰非也曰然則何以知其佳淵材曰海棠無香昌州海棠獨香非佳郡乎聞者傳以為笑墨客揮犀前輩作花詩多用美女比其狀如曰若教解語能傾國任是無情也動人陳俗哉山谷作酴醿詩曰露濕何郎試湯餅日烘荀令炷爐香乃用美丈夫比之若將出類而吾叔淵材作海棠詩又不然曰雨過温泉浴妃子露濃湯餅試何郎意尤工也仁宗朝張冕學士賦蜀中海棠詩沈立取以載海棠記中云山木𤓰開千顆顆水林檎發一攢攢注云大約木𤓰林檎花初開皆與海棠相類若冕言則江西人正謂棠梨花耳惟紫綿色者始謂之海棠按沈立記言其花五出初極紅如臙脂㸃㸃然及開則漸成纈暈至落則若宿粧淡粉審此則似木𤓰林檎六花者非真海棠明矣晏元獻云已定復揺春水色似紅如白海棠花然則元獻亦與張冕同意耶閩中漕宇修貢堂下海棠極盛三面共二十四叢長條脩榦頃所未見每春著花真錦繡段其間有如紫綿揉色者亦有不如此者蓋其種類不同不可一槩論也至其花落則皆若宿粧淡粉矣余三春對此觀之至熟大率富沙多此官舎人家徃徃皆種之並是帚子海棠正與蜀中者相類斯可貴耳今江浙間别有一種柔枝長蔕顔色淺紅垂英向下如日蔫者謂之垂絲海棠全與此不相類蓋强名耳劉淵材謂人曰平生死無恨所恨者五事耳人問其故淵材欲説斂目不言乆之曰吾論不入時聽恐爾曹輕易之問者力請乃荅曰第一恨鰣魚多骨二恨金橘太酸三恨蓴菜性冷四恨海棠無香五恨曽子固不能詩聞者大笑淵材瞠目荅曰諸子果輕易吾論也王介甫梅詩云少陵為爾牽詩興可是無心賦海棠杜黙云倚風莫怨唐工部後裔誰知不解詩曽不若東坡柯丘海棠長篇冠古絶今雖不指名老杜而補亡之意蓋使來世自曉也䂬溪詩話東風嫋嫋泛崇光香霧霏霏月轉廊只恐夜深花睡去更燒銀燭照紅粧先生常作大字如掌書此詩似是晚年筆劄與集本不同者嫋嫋作渺渺霏霏作空濛故墨跡舊藏秦少師伯陽後歸林右司子長今從墨蹟呉興沈氏註東坡詩東坡謫居齊安時以文章游戲三昧齊安樂籍中李宜者色藝不下他妓他妓因燕席中有得詩曲者宜以語訥不能有所請人皆咎之坡將移臨汝於飲餞處宜哀鳴力請坡半酣笑謂之曰東坡居士文名乆何事無言及李宜恰似西川杜工部海棠雖好不吟詩詩話緫龜蜀潘炕有嬖妾解愁姓趙氏其母夢吞海棠花蘂而生頗有國色善為新聲外史檮杌黎舉常云欲令梅聘海棠棖子臣櫻桃及以芥嫁笋但恨時不同然牡丹酴醿楊梅枇杷盡為執友雲仙散録海棠花欲鮮而盛於冬至日早以糟水澆根下瑣碎録李贊皇花木記以海為名者悉從海外來如海棠之類是也同前海棠候花謝結子剪去來年花盛而無葉同前真宗御製後苑雜花十題以海棠為首近臣唱和瑣碎後録唐相賈耽著百花譜以海棠為花中神僊同前重葉海棠曰花命婦又云多葉海棠曰花戚里牡丹榮辱志每嵗冬至前後正宜移掇窠子隨手使肥水澆以盫過麻屑糞土壅培根柢使之厚宻纔到春暖則枝葉自然大發著花亦繁宻矣長春備用許昌薛能海棠詩叙蜀海棠有聞而詩無聞花木録南海棠本性無異惟枝多屈曲數數有刺如杜梨花亦繁盛開稍早同前海棠譜卷上
