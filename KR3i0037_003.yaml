body:
  text: 海棠譜卷下宋陳思撰詩下商山海棠王元之錦里名雖盛商山艷更繁别疑天與態不稱土生根淺著紅蘭染深於絳雪噴待開先讓酒怕落預呼魂香裏無勍敵花中是至尊桂須辭月窟桃合避仙源浮動冠頻側霓裳袖忽翻望夫臨水石窺客出牆垣贈别難饒栁忘憂肯讓萱輕輕飛燕舞脈脈息媯言蕙陋虛侵徑梨凡浪占園論心留蝶宿低面厭鶯喧不忝神仙品好事者作花品以此為神仙何辜造化恩自期栽御苑誰使擲山村綺季荒祠畔仙娥古洞門烟愁思舊夢雨泣怨新婚畫恐明妃恨移同卓氏奔秪教三月見不得四時存繡被堆籠勢燕脂浥淚痕二車春未去應得伴芳樽别堂後海棠同前一堆紅雪媚青春惜别須教淚滿巾好在明年莫憔悴校書兼是愛花人此花余去後是推官王校書移入題錢塘縣羅江東手植海棠王元之江東遺跡在錢塘手植庭花滿縣香若使當年君顯位海棠今日是甘棠寓居定慧院之東雜花滿山有海棠一株土人不知貴也蘇軾江城地瘴蕃草木只有名花苦幽獨嫣然一笑竹籬間桃李漫山總粗俗也知造物有深意故遣佳人在空谷自然富貴出天姿不待金盤薦華屋朱唇得酒暈生臉翠袖卷紗紅映肉林深霧暗曉光遲日暖風輕春睡足雨中有淚亦悽愴月下無人更清淑先生食飽無一事散步逍遙自捫腹不問人家與僧舍柱杖敲門看修竹忽逢絶艷照衰朽歎息無言揩病目陋邦何處得此花無乃好事移西蜀寸根千里不易到銜子飛來定鴻鵠天涯流落俱可念為飲一樽歌此曲明朝酒醒還獨來雪落紛紛那忍觸海棠前人東風嫋嫋泛崇光香霧霏霏月轉廊只恐夜深花睡去髙燒銀燭照紅粧遊海棠西山示趙彥成邵康節東風吹雨過溪門白白朱朱亂逺村灘石已無回棹勢岸楓猶出繫船痕時危不厭江山僻客好惟知笑語溫莫上南岡看春色海棠花下却銷魂海棠韓持國濯錦江頭千萬枝當來未解惜芳菲而今得向君家見不怕春寒雨濕衣在禁林時有懷荆南舊遊元厚之去年曾醉海棠叢聞說新枝發舊紅昨夜夢回花下飲不知身在玉堂中海棠洪覺範酒入香腮笑不知小粧初罷醉兒癡一株栁外牆頭見却勝千叢著雨時海棠崔德符渾是華清出浴初碧綃斜掩見紅膚便教桃李能言語要比嬌妍比得無海棠并序梅聖俞道損司門前日過訪别且云計程二月到郡正看暗惡海棠頗見太守風味因為詩以送行蜀州海棠勝兩川使君欲賞意已猛春露洗開千萬株燕脂㸃素攢細梗朝看不足夜秉燭何暇更尋桃與杏青泥劒棧將度時跨馬莫辭霜氣冷海棠同前江燕入朱閣海棠繁錦條醉生燕玉頰瘦聚楚宫腰曽不分香去尤宜著意描誰能共吹笛樹下想前朝豫嘗於宋宣狄宅見固盡明皇於海棠花下卧吹觱篥寧王吹笛黃幡綽拍又要識吳同蜀須看線海棠燕脂色欲滴紫蠟帶何長夜雨偏宜著春風一任狂當時杜子美吟遍獨相忘海棠王荆公緑嬌隱約眉輕掃紅嫩妖嬈臉薄粧巧筆寫傳功未盡清才吟詠興何長移嶽州去房陵道中見海棠張藝叟馬息山頭見海棠羣仙㑹處錦屛張天寒日晚行人絶自落自開還自香和何靖山人海棠文與可為愛香苞照地紅倚欄終日對芳叢夜深忽憶南枝好把酒更來明月中朝二家有海棠去嵗花開朝二呼杜卿家小娃歌舞花下痛飲今春花開復欲招客而杜已出守戲以詩調之張文潛頗疑蜂蝶過鄰家知是東牆去嵗花駿馬無因迎小妾鴟夷何用强隨車雨中對酒庭下海棠經雨不謝陳參政巴陵二月客添衣草草杯盤恨醉遲燕子不禁連夜雨海棠猶待老人詩天翻地覆傷春色齒豁頭童祝聖時白竹籬前湖海濶茫茫身世兩堪悲陪粹翁舉酒於君子亭亭下海棠方開同上世故驅人殊未央即從地主借繩牀春風浩浩吹游子暮雨霏霏濕海棠古國衣冠無態度隔簾花葉有輝光使君禮數能寬否酒味撩人我欲狂和冬曦海棠程金紫花中名品異人重比甘棠苞嫩相思密紅深琥珀光好風傳馥郁凡卉愧芬芳爛漫雲成瑞葳𬎼女有嬙生來先蜀國開處始朝陽賞即笙歌地題稱翰墨場煙霞容易散蜂蝶等閒忙誰是多情侣欄邊重舉觴今朝秋氣蕭瑟不意海棠再開因書二絶期好事者和同前曽逐狂飈取意飛一時春色便依稀舊叢還有香心在却被西風管領歸露濕燕脂淚臉寒獨將幽恨倚欄干精神不比籬邊菊莫把尋常醉眼看雨中海棠玉脆紅輕不耐寒無端風雨苦相干曉來試卷珠簾看蔌蔌飛香滿畫欄惜海棠開晚同前今年春色可勝嗟二月山中未見花長憶去年今夜月海棠花影到窗紗海棠僧如壁賣花檐上爭桃李頓使春工不直錢莫怪海棠不受折要令雲髻絶塵緣江左謂海棠為川紅吳中復靚粧濃淡蘂蒙茸髙下池臺細細風却恨韶華偏蜀土更無顔色似川紅尋香只恐三春暮把酒欣逢一笑同子美詩才猶閣筆至今寂寞錦城中海棠劉子翬幽姿淑態弄春晴梅借風流栁借輕種處靜宜臨野水開時長是近清明幾經夜雨香猶在染盡燕脂畫不成詩老無心為題佛至今惆悵似含情海棠郭震又隨桃李一時榮不逐東風處處生疑是四方嫌不種教於蜀地獨垂名海棠西蜀傳芳日東君著意時鮮葩猩薦血紫萼蠟融脂絳闕疑流落瓊欄合護持無詩任工部今有省郎知和東坡海棠趙次公露氣熹微帶曉光枝邊燦煥映回廊細看素臉元無玉初㸃燕脂駐靚􅀈和東坡定惠院海棠同前化工妙手開羣木酷向海棠私意獨殊姿艷艷雜花裏端覺神仙在流俗睡起燕脂懶未勻天然膩理還豐肉繁華增麗態度逺婀娜含嬌風韻足豈唯婉孌彤管姝真同窈窕關雎淑未能奔往白玉樓要當貯以黃金屋顧雖風暖欲黃昏脈脈難禁倚修竹可憐俗眼不知貴空把容光照山谷此花本出西南地李杜無詩恨遺蜀髙才沒世孰雕龍後輦補亡難刻鵠貂裘季子客齊安相逢忽慰羈人目當年甫白君可繼為花重賦陽春曲把酒因澆礨磈胸搜句輒傾空洞腹多情恐作深雲收兒童莫信來輕觸海棠康肅吳公芾海棠元自有天香底事時人故謗傷不信請來花下坐惱人鼻觀不尋常和澤民求海棠同前君是詩中老作家笑將麗句換名花花因詩去情非淺詩為花來語更嘉須好栽培承雨露莫令憔悴困塵沙他年爛漫如西蜀我欲從君看綺霞見市上有賣海棠者悵然有感同前連年蹤跡滯江鄉長憶吾廬萬海棠想得春來增絶麗無因歸去賞芬芳偶然檐上逢人賣猶記樽前為爾狂何日故園修舊好賸燒銀燭照紅粧和陳子良海棠四首同前春來人物盡熙熙紅紫無情亦滿枝正引衰翁詩思動舉頭那更得君詩花開春色麗晴空惱我狂來只繞叢試問妖嬈誰與比一株勝却萬株紅雨後花頭頓覺肥細看還是舊風姿坐餘自有香芬馥不許凡人取次知十年栽種滿園花無似兹花艷麗多已是譜中推第一不須還更問如何寄朝宗同前海棠已試十分粧細看妖嬈更異常不得與君同勝賞空燒銀燭照紅粧所思亭海棠初開折贈兩使者張栻未須比擬紅深淺更莫平章香有無過雨夕陽樓上看千花容有此膚腴東風著物本無私紅入花梢特地竒想得霜臺春思滿一枝聊遣博新詩黃海棠洪適漢宫嬌半額雅淡稱花仙天與溫柔態粧成取次妍垂絲海棠同前􅎃􅎃似崔徽朝朝長看地誰能解倒懸扶起雲鬟墜次韻陸務觀海棠文簡程公大昌喚回殘睡强矜持淺破朱唇倚笛吹千古妖妍磨不盡長隨春色上花枝題苦竹寺海棠洞相山王之道翠袖朱唇一笑開倚風無力競相偎陽城豈是僧家物端恐齊奴步障來海棠陸游誰道名花獨故宫謂故蜀燕王宫東城盛麗足爭雄橫陳錦幛闌干外盡吸紅雲酒盞中貪看不辭持夜燭倚狂直欲擅春風拾遺舊詠悲零落瘦損腰圍擬未工老杜不應無海棠詩意其失傳爾又十里迢迢望碧雞一城晴雨不曽齊今朝未得平安報便恐飛紅已作泥又蜀地名花擅古今一枝氣可壓千林譏彈更到無香處常恨人言太刻深張園觀海棠同前朝陽照城樓春容極明媚走馬蜀錦園名花動人意嚴粧漢宫曉一笑初破睡定知夜晏歡酒入妖骨醉低鬟羞不語困眼嬌欲閉雖艷無俗姿太息真富貴結束吾方歸此别知幾嵗黃昏廉纎雨千㸃裛紅淚夜宴賞海棠醉書同前便便癡腹本來寬不是天涯强作歡燕子歸來新社雨海棠開後却春寒醉誇落紙詩千首歌費纒頭錦百端深院不聞傳夜漏忽驚蠟淚已堆盤病中久止酒有懷成都海棠之盛同前碧雞坊裏海棠時彌月兼旬醉不知馬上難尋前夢境樽前誰記舊歌辭目窮落日橫千嶂腸斷春光把一枝說與故人應不信茶煙禪榻鬢成絲春晴懷故園海棠楊萬里故園今日海棠開夢入江西錦繡堆萬物皆春人獨老一年過社燕方回似青如白天濃淡欲墮還飛絮往來無那風光消不得遣詩招入翠瓊杯張子儀太守折送秋日海棠同前新樣西風較劣些重陽還放海棠花春紅更把秋霜洗且道精神佳不佳木渠木菊總無光秋色今年付海棠為底夜深花不睡翠紗袖上月如霜海棠譜卷下
